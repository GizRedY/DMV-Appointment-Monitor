services:

  postgres:
    image: postgres:16
    container_name: dmv-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: dmv_monitor
      POSTGRES_USER: dmv_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: dmv-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./shared:/app/shared
    env_file:
      - .env
    environment:
      - TZ=America/New_York
    depends_on:
      - postgres
    command: python api.py

  monitor:
    build:
      context: .
      dockerfile: Dockerfile.monitor
    container_name: dmv-monitor
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared
    env_file:
      - .env
    environment:
      - TZ=America/New_York
    depends_on:
      - postgres
    command: python monitor_service.py

volumes:
  postgres_data: