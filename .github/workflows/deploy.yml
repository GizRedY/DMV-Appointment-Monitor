name: Deploy to VPS

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /root/dmv-app

            git pull origin main
            docker compose build
            docker compose up -d --force-recreate

            echo "Waiting for app to start..."
            sleep 15

            # Smoke test на /health — он не лезет в БД и не требует VAPID
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || true)

            if [ "$HTTP_CODE" != "200" ]; then
              echo "Smoke test FAILED (HTTP $HTTP_CODE). Rolling back..."
              git checkout HEAD~1
              docker compose build
              docker compose up -d --force-recreate
              exit 1
            fi

            echo "Smoke test passed! Deploy successful."